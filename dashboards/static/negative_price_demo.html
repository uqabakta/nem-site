<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Negative Price Analysis</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
  <style>
    body { font-family: Inter, system-ui, sans-serif; color: #14181B; margin: 0; padding: 24px; background: #fff; }
    h1 { font-size: 20px; margin: 0 0 4px; }
    p.note { color: #6B7280; font-size: 13px; margin: 0 0 20px; }
    #chart { max-width: 900px; margin: 0 auto; }
  </style>
</head>
<body>
  <h1>Negative Price Analysis &mdash; Duration Curve</h1>
  <p class="note">Demonstration data &mdash; replace with your exported dashboard.</p>
  <div id="chart"></div>
  <script>
    // synthetic price duration curve: prices sorted high->low, focus on the negative tail
    const n = 2000;
    const prices = [];
    for (let i = 0; i < n; i++) {
      const q = i / n;
      // mostly positive, a tail that dips below zero
      let p = 120 * Math.pow(1 - q, 2.2) - 90 * Math.pow(q, 6);
      prices.push(p);
    }
    const x = prices.map((_, i) => (100 * i / n));
    const trace = {
      x: x, y: prices, mode: 'lines', fill: 'tozeroy',
      line: { color: '#E8743B', width: 2 },
      hovertemplate: '%{x:.1f}% of time<br>$%{y:.0f}/MWh<extra></extra>'
    };
    const layout = {
      template: 'plotly_white',
      margin: { t: 20, l: 60, r: 20, b: 50 },
      xaxis: { title: '% of dispatch intervals', gridcolor: '#EDEDE7' },
      yaxis: { title: 'RRP ($/MWh)', gridcolor: '#EDEDE7', zerolinecolor: '#14181B' },
      font: { family: 'Inter, system-ui, sans-serif', color: '#14181B' },
      shapes: [{ type: 'line', x0: 0, x1: 100, y0: 0, y1: 0, line: { color: '#14181B', width: 1, dash: 'dot' } }]
    };
    Plotly.newPlot('chart', [trace], layout, { responsive: true, displayModeBar: false });
  </script>
</body>
</html>
